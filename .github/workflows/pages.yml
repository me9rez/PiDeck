name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "docs/images/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "docs/images/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    # 自定义域名 pideck.caoayu.top 挂在站点根路径，不能再按 /PiDeck/ 子路径构建。
    env:
      VITEPRESS_BASE: /
      DOCS_SITE_ORIGIN: https://pideck.caoayu.top

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build documentation site
        run: npm run docs:build

      - name: Generate sitemap
        run: |
          BASE="${VITEPRESS_BASE:-/}"
          ORIGIN="${DOCS_SITE_ORIGIN:-https://pideck.caoayu.top}"
          SITEMAP="docs-site/.vitepress/dist/sitemap.xml"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$SITEMAP"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$SITEMAP"
          find docs-site/.vitepress/dist -type f -name '*.html' | sort | while read -r file; do
            rel="${file#docs-site/.vitepress/dist/}"
            rel="${rel%.html}"
            if [ "$rel" = "index" ]; then
              loc="$BASE"
            else
              loc="$BASE$rel/"
            fi
            echo "  <url><loc>${ORIGIN}${loc}</loc></url>" >> "$SITEMAP"
          done
          echo '</urlset>' >> "$SITEMAP"
          cat "$SITEMAP"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
