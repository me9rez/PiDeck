name: Restrict main branch PR from non-members

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - 'main'

jobs:
  check-author:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        id: check
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const association = pr.data.author_association;
            const author = pr.data.user.login;
            core.info(`PR #${prNumber} author: ${author}, association: ${association}`);

            if (association !== 'OWNER' && association !== 'COLLABORATOR') {
              core.info(`Non-member PR to main — will close and comment.`);
              const body =
                `👋 你好 @${author}，感谢你的贡献！\n\n` +
                `本仓库的非协作者 PR 请提交到 \`dev\` 分支，而不是 \`main\`。\n\n` +
                `请将 PR 的目标分支改为 \`dev\` 后重新提交，谢谢！\n___\n` +
                `Hi @${author}, thanks for your contribution!\n\n` +
                `For non-collaborators, please submit PRs targeting the \`dev\` branch instead of \`main\`.\n\n` +
                `Please update your PR target to \`dev\` and re-submit. Thank you!`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                state: 'closed',
              });
              core.setOutput('action', 'closed');
            } else {
              core.info(`Member PR to main — allowed.`);
              core.setOutput('action', 'allowed');
            }
