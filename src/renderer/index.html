<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob: https://cloudcache.tencent-cloud.com https://skillhub-1388575217.cos.accelerate.myqcloud.com; font-src 'self' data:; connect-src 'self' ws: http://127.0.0.1:* http://localhost:* https://api.skillhub.cn"
    />
    <title></title>
    <style>
      /* 启动画面：独立于 #root，React 挂载后淡出移除；不依赖外部字体/图片，保证首帧极快。 */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: #eef0f3;
      }

      #boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
          radial-gradient(1200px 600px at 50% 28%, rgba(26, 158, 60, 0.10), transparent 62%),
          linear-gradient(180deg, #f5f6f3 0%, #eef0f3 55%, #e9ebe7 100%);
        transition: opacity 420ms cubic-bezier(0.22, 1, 0.36, 1), transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: opacity, transform;
      }
      #boot-overlay.fade-out {
        opacity: 0;
        transform: scale(1.02);
        pointer-events: none;
      }

      .boot-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: boot-rise 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .boot-logo {
        position: relative;
        width: 88px;
        height: 88px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        background: linear-gradient(145deg, #1a9e3c, #0d7a2a);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18) inset,
          0 14px 32px rgba(26, 158, 60, 0.24),
          0 2px 8px rgba(15, 23, 42, 0.08);
      }
      .boot-logo::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 28px;
        border: 1px solid rgba(26, 158, 60, 0.18);
        animation: boot-ring 1.8s ease-out infinite;
        pointer-events: none;
      }
      .boot-logo svg {
        width: 48px;
        height: 48px;
      }

      .boot-title {
        color: #1f2937;
        font-size: 20px;
        font-weight: 650;
        letter-spacing: 0.01em;
        font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
        line-height: 1.2;
      }
      .boot-subtitle {
        color: #6b7280;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
        font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
        line-height: 1.3;
      }

      .boot-progress {
        width: 120px;
        height: 3px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.08);
        overflow: hidden;
        animation: boot-rise 520ms cubic-bezier(0.22, 1, 0.36, 1) 80ms both;
      }
      .boot-progress-bar {
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #1a9e3c, #22c55e);
        animation: boot-progress 1.15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes boot-rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes boot-ring {
        0% {
          opacity: 0.55;
          transform: scale(0.92);
        }
        70% {
          opacity: 0;
          transform: scale(1.08);
        }
        100% {
          opacity: 0;
          transform: scale(1.08);
        }
      }
      @keyframes boot-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }

      @media (prefers-color-scheme: dark) {
        html, body {
          background: #111315;
        }
        #boot-overlay {
          background:
            radial-gradient(1000px 520px at 50% 30%, rgba(34, 197, 94, 0.12), transparent 60%),
            linear-gradient(180deg, #15181b 0%, #111315 100%);
        }
        .boot-title {
          color: #f3f4f6;
        }
        .boot-subtitle {
          color: #9ca3af;
        }
        .boot-progress {
          background: rgba(255, 255, 255, 0.08);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-brand,
        .boot-progress,
        .boot-logo::after,
        .boot-progress-bar {
          animation: none !important;
        }
        #boot-overlay {
          transition-duration: 120ms;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- 启动画面覆盖层：React 挂载后通过 fade-out 动画淡出再移除 -->
    <div id="boot-overlay">
      <div class="boot-brand">
        <div class="boot-logo">
          <svg viewBox="140 140 520 520" aria-hidden="true">
            <path fill="#fff" fill-rule="evenodd" d="M165.29 165.29H517.36V400H400V517.36H282.65V634.72H165.29ZM282.65 282.65V400H400V282.65Z"/>
            <path fill="#fff" d="M517.36 400H634.72V634.72H517.36Z"/>
          </svg>
        </div>
        <strong class="boot-title">PiDeck</strong>
        <span class="boot-subtitle">正在启动工作台…</span>
      </div>
      <div class="boot-progress" aria-hidden="true">
        <div class="boot-progress-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
